     <meta name="description" content="INVESTRO - India's leading online trading platform. Invest in stocks, derivatives, mutual funds, and more." />
    <title>INVESTRO</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("investro-theme");
          if (t === "light" || t === "dark") {
            document.documentElement.setAttribute("data-theme", t);
            document.documentElement.setAttribute("data-bs-theme", t);
          }
        } catch (e) {}
      })();
    </script>

    <div id="root"></div>
