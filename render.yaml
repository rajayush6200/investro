services:
  # Frontend (Landing Site)
  - type: web
    name: investro-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache

  # Dashboard (Trading Terminal)
  - type: web
    name: investro-dashboard
    runtime: static
    buildCommand: cd dashboard && npm install && npm run build
    staticPublishPath: dashboard/build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache

  # Backend API (Express)
  - type: web
    name: investro-api
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: MONGO_URL
        sync: false
      - key: TOKEN_KEY
        sync: false
      - key: PORT
        value: 4000
